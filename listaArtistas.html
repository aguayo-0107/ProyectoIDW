    <script>
        //Funcionalidad
        const doc = document.documentElement;
        const btnL  = document.getElementById('btn-light');
        const btnD  = document.getElementById('btn-dark');

        const saved = localStorage.getItem('theme');
        const system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        applyTheme(saved ?? system);

        btnL.addEventListener('click', () => {
            applyTheme("light");
        });
        btnD.addEventListener('click', () => {
            applyTheme("dark");
        });

        function applyTheme(theme) {
            doc.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
        }
    </script>
    <script>
        //APIs
        let currentPage = 1;
        const pageSize = 6;

        async function loadArtists() {
            const res = await getLista(currentPage, pageSize);
            if (res[0]) {
                formatearLista(res[1].items);
                pagination(res[1].total);
            }
            else {
                alert("Hubo un error al cargar los datos. Intentalo más tarde.")
            }
        }

        function pagination(totalItems) {
            const totalPages = Math.ceil(totalItems / pageSize);
            const control = document.getElementById('pagination-count');
            let html = "";

            for (let i = 1; i <= totalPages; i++) {
                activo = "";
                if (i == currentPage)
                    activo = "active"
                html += `
                    <li class="page-item ${activo}">
                        <a class="page-link" href="#" onclick="cambioPag(${i})">${i}</a>
                    </li>
                    `;
            }
            control.innerHTML = html;
        }
        function formatearLista(items) {
            const container = document.getElementById('items-container');
            html = "";
            for (let i = 0; i < items.length; i++) {
                html += `
                    <div class="col">
                    <div class="card shadow-sm">
                    <h5 class="card-header">Fans: ${items[i].fans}</h5>
                    <div class="card-body">
                        <h5 class="card-title">${items[i].nombre}</h5>
                        <p class="card-text">Genero: ${items[i].genero}</p>
                    </div>
                    </div>
                </div>`
            }
            html += "</ul>"
            container.innerHTML = html;
        }
        function cambioPag(pag) {
            currentPage = pag;
            loadArtists();
        }

        
    </script>
