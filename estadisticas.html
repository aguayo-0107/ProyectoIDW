    <script>
        //Funcionalidad
        const doc = document.documentElement;
        const btnL  = document.getElementById('btn-light');
        const btnD  = document.getElementById('btn-dark');

        const saved = localStorage.getItem('theme');
        const system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        applyTheme(saved ?? system);

        btnL.addEventListener('click', () => {
            applyTheme("light");
        });
        btnD.addEventListener('click', () => {
            applyTheme("dark");
        });

        function applyTheme(theme) {
            doc.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
        }
    </script>
    <script>
        // Grafica
        const lugares = 3;

        async function graficas() {
            const res = await getArtistas()
            if (res[0]) {
                n = res[1].length;
                const topArtistas = res[1]
                    .sort((a, b) => a.ranking - b.ranking)
                    .slice(0, lugares);
                const nombresTop = topArtistas.map(a => a.nombre);
                const rankings = topArtistas.map(a => (n + 1) - a.ranking);

                const coloresPodio = [
                    '#6D28D9',
                    '#2563EB',
                    '#F97316'
                ];
                renderizarPodio(topArtistas, nombresTop, rankings, coloresPodio);
            }
            else {
                alert(res[1]);
            }
        }
        function renderizarPodio(topArtistas, nombresTop, rankings, coloresPodio) {
            const ctx = document.getElementById('podioChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: nombresTop,
                    datasets: [{
                        label: 'Posición en el Ranking',
                        data: rankings,
                        backgroundColor: coloresPodio,
                        borderRadius: { topLeft: 15, topRight: 15 },
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            min: 0,
                            max: lugares,
                            ticks: {
                                stepSize: 1,
                                callback: function(value) {
                                    if (value == 0) return ""
                                    return '#' + (lugares + 1 - value);
                                }
                            },
                            grid: { display: false },
                            title: { display: true, text: 'Puesto' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { size: 14, weight: 'bold' },
                                color: '#374151'
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return "Puesto: #"+(lugares + 1 - context.parsed.y);
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
